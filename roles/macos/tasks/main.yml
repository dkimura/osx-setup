- name: macOS アクセシビリティ・ユーザビリティ設定
  block:
    - name: キーリピートの間隔を短く
      ansible.builtin.command: defaults write -g KeyRepeat -int 1
      changed_when: false

    - name: キーリピート開始までの遅延を短く
      ansible.builtin.command: defaults write -g InitialKeyRepeat -int 8
      changed_when: false

    - name: 視差効果を減らす（Reduce motion）
      ansible.builtin.command: defaults write com.apple.universalaccess reduceMotion -bool true
      changed_when: false

    - name: Dockに最近使用したアプリを表示しない
      ansible.builtin.command: defaults write com.apple.dock show-recents -bool false
      changed_when: false
  tags:
    - macos
